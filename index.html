<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>German Vocabulary Trainer</title>

<!-- Cache Fix -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body{font-family:Arial,sans-serif;background:#f4f7fb;margin:0;padding:20px;color:#222}
.wrap{max-width:900px;margin:auto}
.card{background:#fff;padding:20px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:20px}
.row{display:grid;grid-template-columns:1fr auto auto auto;gap:10px}
.btn{border:none;padding:10px 14px;border-radius:10px;cursor:pointer;background:#2563eb;color:#fff}
.btn.green{background:#16a34a}
.btn.gray{background:#64748b}
input,select{padding:10px;border:1px solid #cbd5e1;border-radius:10px;width:100%;box-sizing:border-box}
.big{font-size:30px;font-weight:bold;margin:12px 0}
.muted{color:#64748b}
.ok{color:#16a34a}
.bad{color:#dc2626}
.list{max-height:350px;overflow:auto}
.item{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:8px 0;border-bottom:1px solid #eee}
@media(max-width:700px){.row,.item{grid-template-columns:1fr}.btn{width:100%}}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<h1>🇩🇪 German Vocabulary Trainer</h1>
<p id="progress" class="muted">Loading...</p>
</div>

<div class="card">
<h2>Practice</h2>

<div class="row">
<select id="mode">
<option value="en-de">English → German</option>
<option value="de-en">German → English</option>
</select>

<button class="btn green" onclick="randomizeQueue()">🔀 Randomize</button>
<button class="btn gray" onclick="restartQueue()">↩ Restart</button>
<button class="btn" onclick="skipNext()">Next</button>
</div>

<div id="question" class="big">Loading...</div>

<input id="answer" placeholder="Type your answer"
onkeydown="if(event.key==='Enter')checkAnswer()">

<div style="margin-top:10px">
<button class="btn" onclick="checkAnswer()">Check</button>
</div>

<p id="result"></p>
</div>

<div class="card">
<h2>Words</h2>
<div class="list" id="list"></div>
</div>

</div>

<script>
let words=[];
let queue=[];
let queueIndex=0;
let current=null;

const SHEET_ID='1jf4Rbrl-zyghEYq-u5CX3P96192JCp0ee6gDaNHL0Js';
const GID='1584374672';

function saveQueue(){
 localStorage.setItem('queue_words',JSON.stringify(queue));
 localStorage.setItem('queue_index',queueIndex);
}

function loadQueue(){
 queue=JSON.parse(localStorage.getItem('queue_words')||'[]');
 queueIndex=parseInt(localStorage.getItem('queue_index')||'0');
}

function shuffle(arr){
 for(let i=arr.length-1;i>0;i--){
   const j=Math.floor(Math.random()*(i+1));
   [arr[i],arr[j]]=[arr[j],arr[i]];
 }
 return arr;
}

function randomizeQueue(){
 queue=[...Array(words.length).keys()];
 shuffle(queue);
 queueIndex=0;
 saveQueue();
 nextQuestion();
}

function restartQueue(){
 queueIndex=0;
 saveQueue();
 nextQuestion();
}

function skipNext(){
 queueIndex++;
 saveQueue();
 nextQuestion();
}

function updateProgress(){
 let total=words.length;
 let done=Math.min(queueIndex,total);
 let remain=Math.max(total-done,0);

 document.getElementById('progress').textContent=
 `📚 Completed: ${done} / ${total} | Remaining: ${remain}`;
}

function renderList(){
 document.getElementById('list').innerHTML=
 words.map(w=>`
 <div class="item">
   <div>${w.german}</div>
   <div>${w.english}</div>
   <div>${w.comment||''}</div>
 </div>
 `).join('');
}

function loadSheet(){
 const old=document.getElementById('sheetLoader');
 if(old) old.remove();

 const s=document.createElement('script');
 s.id='sheetLoader';
 s.src='https://docs.google.com/spreadsheets/d/'+SHEET_ID+
 '/gviz/tq?tqx=responseHandler:sheetCallback&gid='+GID+'&t='+(Date.now());

 document.body.appendChild(s);
}

function sheetCallback(data){
 try{
   const rows=data.table.rows;

   words=rows.map(r=>({
     german:(r.c[0]&&r.c[0].v)||'',
     english:(r.c[1]&&r.c[1].v)||'',
     comment:(r.c[2]&&r.c[2].v)||''
   })).filter(w=>w.german && w.english);

   renderList();

   loadQueue();

   if(queue.length!==words.length){
     randomizeQueue();
   }else{
     nextQuestion();
   }

 }catch(e){
   document.getElementById('question').textContent='Failed loading sheet';
 }
}

function nextQuestion(){

 updateProgress();

 if(queueIndex>=queue.length){
   document.getElementById('question').innerHTML=
   '🎉 All words completed.<br><span class="muted">Press Randomize</span>';
   return;
 }

 current=words[queue[queueIndex]];
 const mode=document.getElementById('mode').value;

 if(mode==='en-de'){
   document.getElementById('question').innerHTML=
   current.english+
   (current.comment?
   '<div style="font-size:16px;color:#64748b;margin-top:8px">💡 '+current.comment+'</div>':'');
 }else{
   document.getElementById('question').textContent=current.german;
 }

 document.getElementById('answer').value='';
 document.getElementById('result').textContent='';
}

function normalize(s){
 return (s||'').toLowerCase().trim();
}

function checkAnswer(){

 if(!current) return;

 const mode=document.getElementById('mode').value;
 const correct=(mode==='en-de')?current.german:current.english;
 const ans=document.getElementById('answer').value;

 if(normalize(ans)===normalize(correct)){

   document.getElementById('result').innerHTML=
   '<span class="ok">✅ Correct!</span>';

   queueIndex++;
   saveQueue();

   setTimeout(nextQuestion,500);

 }else{

   document.getElementById('result').innerHTML=
   '<span class="bad">❌ Wrong.</span> Correct answer: <b>'+correct+'</b>';
 }
}

loadSheet();
</script>
</body>
</html>
