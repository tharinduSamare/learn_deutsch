<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>German Vocabulary Trainer</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f7fb;margin:0;padding:20px;color:#222}.wrap{max-width:900px;margin:auto}.card{background:#fff;padding:20px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:20px}.row{display:grid;grid-template-columns:1fr auto auto;gap:10px}.btn{border:none;padding:10px 14px;border-radius:10px;cursor:pointer;background:#2563eb;color:#fff}.btn.secondary{background:#64748b}.btn.green{background:#16a34a}input,select{padding:10px;border:1px solid #cbd5e1;border-radius:10px;width:100%;box-sizing:border-box}.muted{color:#64748b}.big{font-size:30px;font-weight:bold;margin:12px 0}.ok{color:#16a34a}.bad{color:#dc2626}.list{max-height:360px;overflow:auto}.item{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:8px 0;border-bottom:1px solid #eee}@media(max-width:700px){.row,.item{grid-template-columns:1fr}.btn{width:100%}}
</style>
</head>
<body>
<div class='wrap'>
<div class='card'>
<h1>🇩🇪 German Vocabulary Trainer</h1>
<p class='muted'>Loads words directly from your Google Sheet.</p>
</div>
<div class='card'>
<h2>Practice</h2>
<div class='row'>
<select id='mode'>
<option value='en-de'>English → German</option>
<option value='de-en'>German → English</option>
</select>
<button class='btn secondary' onclick='nextQuestion()'>New Word</button>
<button class='btn green' onclick='loadSheet()'>Refresh Sheet</button>
</div>
<div id='question' class='big'>Loading words...</div>
<input id='answer' placeholder='Type your answer' onkeydown="if(event.key==='Enter')checkAnswer()">
<div style='margin-top:10px'><button class='btn' onclick='checkAnswer()'>Check</button></div>
<p id='result'></p>
</div>
<div class='card'>
<h2>Words From Google Sheet</h2>
<div class='list' id='list'></div>
</div>
</div>
<script>
let words=[];
let current=null;
const SHEET_URL='https://docs.google.com/spreadsheets/d/1jf4Rbrl-zyghEYq-u5CX3P96192JCp0ee6gDaNHL0Js/edit?gid=1584374672#gid=1584374672';
function parseCSVLine(line){const out=[];let cur='';let q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){q=!q;}else if(ch===','&&!q){out.push(cur);cur='';}else{cur+=ch;}}out.push(cur);return out.map(v=>v.trim());}
async function loadSheet(){const q=document.getElementById('question');q.textContent='Loading words...';try{const res=await fetch(SHEET_URL);const txt=await res.text();const rows=txt.trim().replace(/
/g,'').split('
').slice(1);words=rows.map(r=>{const c=parseCSVLine(r);return {german:c[0]||'',english:c[1]||'',comment:c[2]||''};}).filter(w=>w.german&&w.english);render();nextQuestion();}catch(e){q.textContent='Failed to load Google Sheet';console.error(e);}}
function render(){const el=document.getElementById('list');el.innerHTML=words.map(w=>`<div class='item'><div>${w.german}</div><div>${w.english}</div><div>${w.comment}</div></div>`).join('');}
function nextQuestion(){if(words.length===0){document.getElementById('question').textContent='No words loaded';return;}current=words[Math.floor(Math.random()*words.length)];const mode=document.getElementById('mode').value;const q=document.getElementById('question');if(mode==='en-de'){q.innerHTML=current.english+(current.comment?`<div style="font-size:16px;color:#64748b;margin-top:8px">💡 ${current.comment}</div>`:'');}else{q.textContent=current.german;}document.getElementById('answer').value='';document.getElementById('result').textContent='';}
function normalize(s){return s.toLowerCase().trim();}
function checkAnswer(){if(!current)return;const mode=document.getElementById('mode').value;const correct=mode==='en-de'?current.german:current.english;const ans=document.getElementById('answer').value;const r=document.getElementById('result');if(normalize(ans)===normalize(correct)){r.innerHTML="<span class='ok'>✅ Correct!</span>";setTimeout(nextQuestion,700);}else{r.innerHTML=`<span class='bad'>❌ Wrong.</span> Correct answer: <b>${correct}</b><br>Try again.`;}}
loadSheet();
</script>
</body>
</html>
